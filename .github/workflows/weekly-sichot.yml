name: Weekly Sichot

# Dimanche 8h (heure de Paris), géré DST : 6h UTC (été) + 7h UTC (hiver),
# avec un garde-fou qui ne s'exécute QUE s'il est 8h à Paris. workflow_dispatch = test manuel.
on:
  schedule:
    - cron: '0 6 * * 0'
    - cron: '0 7 * * 0'
  workflow_dispatch: {}

jobs:
  fetch-sichot:
    runs-on: ubuntu-latest
    steps:
      - id: guard
        name: Garde-fou 8h Paris
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Déclenchement manuel."; echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          H=$(TZ=Europe/Paris date +%H)
          echo "Heure Paris: $H"
          if [ "$H" = "08" ]; then echo "proceed=true" >> "$GITHUB_OUTPUT";
          else echo "Pas 8h à Paris, on saute."; echo "proceed=false" >> "$GITHUB_OUTPUT"; fi

      - name: Checkout
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: steps.guard.outputs.proceed == 'true'
        run: npm ci

      - name: Écrire la clé de service Firebase
        if: steps.guard.outputs.proceed == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > scripts/service-account-key.json

      - name: Récupérer les Si'hot de la semaine
        if: steps.guard.outputs.proceed == 'true'
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          BOX_ENTERPRISE_ID: ${{ secrets.BOX_ENTERPRISE_ID }}
        run: node scripts/fetch-weekly-sichot.mjs
